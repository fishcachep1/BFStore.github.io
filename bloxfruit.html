<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shop Acc Blox Fruits - ShopRobloxS</title>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{--red:#e63946;--dark-red:#c1121f;--yellow:#ffd60a;--bg:#f0f4ff;--nav:#1a1a2e;}
    body{font-family:'Nunito',sans-serif;background:var(--bg);min-height:100vh;}

    .float-item{position:fixed;pointer-events:none;z-index:0;animation:floatAnim 6s ease-in-out infinite;opacity:0.12;}
    .float-item:nth-child(1){top:10%;left:5%;font-size:2rem;}
    .float-item:nth-child(2){top:40%;right:4%;font-size:1.8rem;animation-delay:2s;}
    .float-item:nth-child(3){top:75%;left:3%;font-size:1.5rem;animation-delay:1s;}
    @keyframes floatAnim{0%,100%{transform:translateY(0);}50%{transform:translateY(-16px) rotate(8deg);}}

    /* NAV */
    nav{background:var(--nav);padding:0 2rem;display:flex;align-items:center;height:60px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,0.3);}
    .logo{font-family:'Bangers',cursive;font-size:1.9rem;color:var(--yellow);letter-spacing:2px;text-shadow:2px 2px 0 var(--red);text-decoration:none;}
    .logo span{color:var(--red);}
    .nav-back{margin-left:1rem;background:none;border:none;color:rgba(255,255,255,0.6);font-family:'Nunito',sans-serif;font-size:0.85rem;cursor:pointer;display:flex;align-items:center;gap:0.3rem;}
    .nav-back:hover{color:white;}

    /* MAIN */
    main{max-width:1200px;margin:0 auto;padding:1.5rem;position:relative;z-index:1;}

    .search-wrap{display:flex;align-items:center;gap:0.6rem;background:white;border-radius:10px;padding:0.5rem 1rem;box-shadow:0 2px 8px rgba(0,0,0,0.08);width:fit-content;margin-bottom:1rem;}
    .search-wrap input{border:none;outline:none;font-family:'Nunito',sans-serif;font-size:0.95rem;width:220px;}

    .breadcrumb{font-size:0.82rem;color:#666;margin-bottom:1.5rem;display:flex;align-items:center;gap:0.4rem;}
    .breadcrumb a{color:var(--red);text-decoration:none;font-weight:600;}

    .page-title{font-family:'Bangers',cursive;font-size:2rem;color:var(--nav);letter-spacing:2px;text-align:center;margin-bottom:1.8rem;}

    /* GRID */
    .acc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1.4rem;}

    .acc-card{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,0.1);transition:transform 0.22s,box-shadow 0.22s;position:relative;}
    .acc-card:hover{transform:translateY(-5px);box-shadow:0 12px 30px rgba(230,57,70,0.2);}

    .acc-thumb{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;}
    .acc-thumb-placeholder{width:100%;aspect-ratio:16/9;background:linear-gradient(135deg,#0a3d62 0%,#e63946 100%);display:flex;align-items:center;justify-content:center;font-family:'Bangers',cursive;font-size:1.5rem;color:var(--yellow);text-align:center;letter-spacing:1px;text-shadow:2px 2px 0 #000;padding:1rem;}

    .acc-body{padding:1rem;}
    .acc-name{font-weight:800;font-size:0.9rem;color:#1a1a2e;margin-bottom:0.8rem;line-height:1.4;}
    .acc-stats{margin-bottom:0.8rem;}
    .acc-stat-row{display:flex;justify-content:space-between;align-items:center;font-size:0.8rem;color:#555;padding:3px 0;border-bottom:1px dashed #eee;}
    .acc-stat-row:last-child{border-bottom:none;}
    .acc-stat-label{font-weight:600;}
    .acc-stat-val{color:#1a1a2e;font-weight:700;}

    .acc-footer{display:flex;justify-content:space-between;align-items:center;margin-top:0.8rem;padding-top:0.8rem;border-top:2px solid #f0f0f0;}
    .acc-price{display:flex;align-items:center;gap:0.3rem;font-weight:800;font-size:1rem;color:var(--red);}
    .btn-buy{background:var(--red);color:white;border:none;padding:8px 16px;border-radius:8px;font-family:'Nunito',sans-serif;font-weight:700;font-size:0.85rem;cursor:pointer;display:flex;align-items:center;gap:0.4rem;transition:background 0.2s,transform 0.1s;}
    .btn-buy:hover{background:var(--dark-red);transform:scale(1.04);}

    .badge-new{position:absolute;top:10px;left:10px;background:var(--red);color:white;font-size:0.65rem;font-weight:800;padding:3px 10px;border-radius:20px;letter-spacing:1px;}

    /* DELETE BTN — chỉ hiện khi đã đăng nhập admin */
    .btn-delete{width:100%;margin-top:0.5rem;background:none;border:1px dashed #ddd;border-radius:6px;padding:4px;font-size:0.72rem;color:#ccc;cursor:pointer;font-family:'Nunito',sans-serif;display:none;}
    .btn-delete:hover{color:var(--red);border-color:var(--red);}
    body.admin-mode .btn-delete{display:block;}

    /* EMPTY STATE */
    .empty-state{grid-column:1/-1;text-align:center;padding:4rem 2rem;color:#aaa;}
    .empty-state .icon{font-size:3rem;margin-bottom:1rem;display:block;}

    /* ======= ADMIN BUTTON (chỉ hiện nút, ẩn panel) ======= */
    .admin-toggle{
      position:fixed;bottom:5rem;right:1.5rem;
      background:var(--nav);color:rgba(255,255,255,0.3);
      border:none;border-radius:50%;width:42px;height:42px;
      font-size:1rem;cursor:pointer;z-index:200;
      box-shadow:0 2px 8px rgba(0,0,0,0.15);
      transition:color 0.2s;
    }
    .admin-toggle:hover{color:var(--yellow);}

    /* ======= LOGIN MODAL ======= */
    .modal-overlay{
      display:none;position:fixed;inset:0;
      background:rgba(0,0,0,0.55);z-index:500;
      align-items:center;justify-content:center;
    }
    .modal-overlay.open{display:flex;}

    .modal-box{
      background:white;border-radius:18px;padding:2rem;
      width:320px;box-shadow:0 12px 40px rgba(0,0,0,0.25);
      position:relative;
    }
    .modal-box h3{font-size:1.1rem;font-weight:800;color:var(--nav);margin-bottom:1.2rem;text-align:center;}
    .modal-box input{
      width:100%;border:1.5px solid #e0e0e0;border-radius:8px;
      padding:0.6rem 0.8rem;font-family:'Nunito',sans-serif;font-size:0.9rem;
      outline:none;margin-bottom:0.8rem;
    }
    .modal-box input:focus{border-color:var(--red);}
    .modal-box .btn-login{width:100%;background:var(--red);color:white;border:none;border-radius:10px;padding:0.7rem;font-family:'Nunito',sans-serif;font-weight:800;font-size:0.95rem;cursor:pointer;}
    .modal-box .btn-login:hover{background:var(--dark-red);}
    .modal-error{color:var(--red);font-size:0.8rem;text-align:center;margin-bottom:0.5rem;display:none;}
    .modal-close{position:absolute;top:0.8rem;right:1rem;background:none;border:none;font-size:1.3rem;cursor:pointer;color:#aaa;}

    /* ======= ADMIN PANEL (chỉ hiện sau đăng nhập) ======= */
    .admin-panel{
      display:none;
      position:fixed;bottom:9rem;right:1.5rem;
      background:white;border-radius:16px;padding:1.5rem;width:340px;
      box-shadow:0 8px 32px rgba(0,0,0,0.2);z-index:300;
      border:2px solid var(--red);
      max-height:80vh;overflow-y:auto;
    }
    .admin-panel.open{display:block;}
    .admin-panel h3{font-size:1rem;font-weight:800;color:var(--nav);margin-bottom:1rem;}

    .form-group{margin-bottom:0.85rem;}
    .form-group label{display:block;font-size:0.78rem;font-weight:700;color:#555;margin-bottom:0.3rem;}
    .form-group input,.form-group textarea{width:100%;border:1.5px solid #e0e0e0;border-radius:8px;padding:0.5rem 0.7rem;font-family:'Nunito',sans-serif;font-size:0.85rem;outline:none;transition:border-color 0.2s;}
    .form-group input:focus,.form-group textarea:focus{border-color:var(--red);}
    .form-group textarea{resize:vertical;min-height:55px;}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:0.6rem;}

    /* Upload ảnh */
    .img-upload-area{
      border:2px dashed #ddd;border-radius:10px;
      padding:1rem;text-align:center;cursor:pointer;
      transition:border-color 0.2s;position:relative;
      min-height:80px;display:flex;flex-direction:column;align-items:center;justify-content:center;
    }
    .img-upload-area:hover{border-color:var(--red);}
    .img-upload-area input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
    .img-upload-area .upload-icon{font-size:1.8rem;margin-bottom:0.3rem;}
    .img-upload-area .upload-text{font-size:0.75rem;color:#999;}
    .img-preview{width:100%;border-radius:8px;margin-top:0.5rem;display:none;}

    .btn-addacc{width:100%;background:var(--red);color:white;border:none;border-radius:10px;padding:0.7rem;font-family:'Nunito',sans-serif;font-weight:800;font-size:0.95rem;cursor:pointer;transition:background 0.2s;margin-top:0.3rem;}
    .btn-addacc:hover{background:var(--dark-red);}

    .btn-logout{width:100%;background:none;border:1px solid #ddd;border-radius:8px;padding:0.5rem;font-family:'Nunito',sans-serif;font-size:0.8rem;color:#aaa;cursor:pointer;margin-top:0.5rem;}
    .btn-logout:hover{border-color:var(--red);color:var(--red);}

    /* TOAST */
    .toast{position:fixed;top:80px;right:2rem;background:#2d6a4f;color:white;padding:0.8rem 1.4rem;border-radius:10px;font-weight:700;font-size:0.9rem;z-index:999;opacity:0;transform:translateY(-10px);transition:opacity 0.3s,transform 0.3s;pointer-events:none;}
    .toast.show{opacity:1;transform:translateY(0);}

    /* ZALO */
    .zalo-btn{position:fixed;right:1.5rem;bottom:2rem;background:#0068ff;color:white;border-radius:50%;width:52px;height:52px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:0.75rem;box-shadow:0 4px 16px rgba(0,104,255,0.4);text-decoration:none;z-index:100;transition:transform 0.2s;}
    .zalo-btn:hover{transform:scale(1.1);}
  </style>
</head>
<body>

  <div class="float-item">⚔️</div>
  <div class="float-item">🍎</div>
  <div class="float-item">💎</div>

  <!-- NAV -->
  <nav>
    <a class="logo" href="index.html">Shop<span>Roblox</span>S</a>
    <button class="nav-back" onclick="location.href='index.html'">← Trang chủ</button>
  </nav>

  <!-- MAIN -->
  <main>
    <div class="search-wrap">
      <span>🔍</span>
      <input type="text" placeholder="Tìm kiếm acc..." id="searchInput" oninput="filterAcc()"/>
    </div>
    <div class="breadcrumb">
      <span>🏠</span><a href="index.html">Trang chủ</a><span>›</span><span>🎮 Shop acc Blox Fruits</span>
    </div>
    <h1 class="page-title">⚔️ Shop acc Blox Fruits</h1>
    <div class="acc-grid" id="accGrid"></div>
  </main>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <!-- ZALO -->
  <a class="zalo-btn" href="https://zalo.me/0981560649" target="_blank">Zalo</a>

  <!-- ADMIN TOGGLE (nút nhỏ, ít nổi bật) -->
  <button class="admin-toggle" id="adminToggleBtn" onclick="handleAdminToggle()" title="Quản lý">⚙️</button>

  <!-- LOGIN MODAL -->
  <div class="modal-overlay" id="loginModal">
    <div class="modal-box">
      <button class="modal-close" onclick="closeLogin()">✕</button>
      <h3>🔐 Đăng nhập quản trị</h3>
      <div class="modal-error" id="loginError">Mật khẩu không đúng!</div>
      <input type="password" id="pwInput" placeholder="Nhập mật khẩu..." onkeydown="if(event.key==='Enter')doLogin()"/>
      <button class="btn-login" onclick="doLogin()">Đăng nhập</button>
    </div>
  </div>

  <!-- ADMIN PANEL (chỉ mở sau khi đăng nhập) -->
  <div class="admin-panel" id="adminPanel">
    <h3>➕ Thêm Acc Blox Fruit</h3>

    <div class="form-group">
      <label>Tên acc / Mô tả ngắn *</label>
      <input type="text" id="accName" placeholder="VD: Acc level 2800, Hải Quân V2..."/>
    </div>

    <div class="form-group">
      <label>📷 Ảnh acc</label>
      <div class="img-upload-area" id="uploadArea">
        <input type="file" accept="image/*" id="imgFileInput" onchange="previewImg(this)"/>
        <div class="upload-icon">📁</div>
        <div class="upload-text">Bấm để chọn ảnh từ máy</div>
      </div>
      <img class="img-preview" id="imgPreview" alt="preview"/>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>💰 Giá (VNĐ) *</label>
        <input type="number" id="accPrice" placeholder="VD: 150000"/>
      </div>
      <div class="form-group">
        <label>⚡ Level</label>
        <input type="number" id="accLevel" placeholder="VD: 2800"/>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>💵 Beli</label>
        <input type="text" id="accBeli" placeholder="VD: 22,000,000"/>
      </div>
      <div class="form-group">
        <label>🔮 Fragments</label>
        <input type="text" id="accFrag" placeholder="VD: 15,000"/>
      </div>
    </div>
    <div class="form-group">
      <label>📋 Mô tả thêm</label>
      <textarea id="accDesc" placeholder="VD: Có Hải Quân V2, Kiếm Yama..."></textarea>
    </div>

    <button class="btn-addacc" onclick="addAcc()">➕ Thêm vào shop</button>
    <button class="btn-logout" onclick="logout()">🚪 Đăng xuất</button>
  </div>

  <script>
    // ======= MẬT KHẨU ADMIN =======
    const ADMIN_PASSWORD = 'T@m1610200'; // ← Đổi mật khẩu tại đây

    let isAdmin = false;
    let currentImgBase64 = '';
    let accList = JSON.parse(localStorage.getItem('bloxfruit_accs') || '[]');

    function save(){ localStorage.setItem('bloxfruit_accs', JSON.stringify(accList)); }

    // ---- ADMIN AUTH ----
    function handleAdminToggle(){
      if(!isAdmin){
        document.getElementById('loginModal').classList.add('open');
        document.getElementById('pwInput').focus();
      } else {
        document.getElementById('adminPanel').classList.toggle('open');
      }
    }

    function doLogin(){
      const pw = document.getElementById('pwInput').value;
      if(pw === ADMIN_PASSWORD){
        isAdmin = true;
        document.body.classList.add('admin-mode');
        document.getElementById('loginModal').classList.remove('open');
        document.getElementById('adminPanel').classList.add('open');
        document.getElementById('pwInput').value = '';
        document.getElementById('loginError').style.display = 'none';
        document.getElementById('adminToggleBtn').style.color = '#ffd60a';
      } else {
        document.getElementById('loginError').style.display = 'block';
        document.getElementById('pwInput').value = '';
        document.getElementById('pwInput').focus();
      }
    }

    function closeLogin(){
      document.getElementById('loginModal').classList.remove('open');
      document.getElementById('loginError').style.display = 'none';
      document.getElementById('pwInput').value = '';
    }

    function logout(){
      isAdmin = false;
      document.body.classList.remove('admin-mode');
      document.getElementById('adminPanel').classList.remove('open');
      document.getElementById('adminToggleBtn').style.color = '';
      showToast('👋 Đã đăng xuất!');
    }

    // ---- ẢNH ----
    function previewImg(input){
      const file = input.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        currentImgBase64 = e.target.result;
        const preview = document.getElementById('imgPreview');
        preview.src = currentImgBase64;
        preview.style.display = 'block';
        document.querySelector('.img-upload-area .upload-icon').textContent = '✅';
        document.querySelector('.img-upload-area .upload-text').textContent = file.name;
      };
      reader.readAsDataURL(file);
    }

    // ---- THÊM ACC ----
    function addAcc(){
      if(!isAdmin){ showToast('❌ Bạn chưa đăng nhập!'); return; }
      const name  = document.getElementById('accName').value.trim();
      const price = document.getElementById('accPrice').value.trim();
      if(!name || !price){ alert('Vui lòng nhập Tên acc và Giá!'); return; }

      accList.unshift({
        name,
        price,
        img:   currentImgBase64,
        level: document.getElementById('accLevel').value.trim(),
        beli:  document.getElementById('accBeli').value.trim(),
        frag:  document.getElementById('accFrag').value.trim(),
        desc:  document.getElementById('accDesc').value.trim(),
      });
      save();
      renderGrid(accList);

      // Reset form
      ['accName','accPrice','accLevel','accBeli','accFrag','accDesc'].forEach(id=>document.getElementById(id).value='');
      currentImgBase64 = '';
      document.getElementById('imgPreview').style.display='none';
      document.getElementById('imgFileInput').value='';
      document.querySelector('.img-upload-area .upload-icon').textContent='📁';
      document.querySelector('.img-upload-area .upload-text').textContent='Bấm để chọn ảnh từ máy';

      document.getElementById('adminPanel').classList.remove('open');
      showToast('✅ Đã thêm acc thành công!');
    }

    function deleteAcc(idx){
      if(!isAdmin) return;
      if(!confirm('Xoá acc này khỏi shop?')) return;
      accList.splice(idx,1);
      save();
      renderGrid(accList);
      showToast('🗑️ Đã xoá acc!');
    }

    // ---- BUY ----
    function buyAcc(){
      window.open('https://zalo.me/0981560649','_blank');
    }

    // ---- RENDER ----
    function renderGrid(list){
      const grid = document.getElementById('accGrid');
      if(!list.length){
        grid.innerHTML = `<div class="empty-state"><span class="icon">📦</span><p>Chưa có acc nào trong shop.</p></div>`;
        return;
      }
      grid.innerHTML = list.map((acc,idx)=>`
        <div class="acc-card">
          <span class="badge-new">🆕 Mới</span>
          ${acc.img
            ? `<img class="acc-thumb" src="${acc.img}" alt="${acc.name}"/>`
            : `<div class="acc-thumb-placeholder">BLOX<br>FRUIT</div>`}
          <div class="acc-body">
            <div class="acc-name">${acc.name}</div>
            <div class="acc-stats">
              ${acc.level?`<div class="acc-stat-row"><span class="acc-stat-label">⚡ Level</span><span class="acc-stat-val">${acc.level}</span></div>`:''}
              ${acc.beli ?`<div class="acc-stat-row"><span class="acc-stat-label">💵 Beli</span><span class="acc-stat-val">${acc.beli}</span></div>`:''}
              ${acc.frag ?`<div class="acc-stat-row"><span class="acc-stat-label">🔮 Fragments</span><span class="acc-stat-val">${acc.frag}</span></div>`:''}
              ${acc.desc ?`<div class="acc-stat-row"><span class="acc-stat-label">📋 Chi tiết</span><span class="acc-stat-val" style="font-size:0.75rem;text-align:right;max-width:140px">${acc.desc}</span></div>`:''}
            </div>
            <div class="acc-footer">
              <div class="acc-price">🪙 ${Number(acc.price).toLocaleString('vi-VN')}đ</div>
              <button class="btn-buy" onclick="buyAcc()">🛒 Mua</button>
            </div>
            <button class="btn-delete" onclick="deleteAcc(${idx})">🗑️ Xoá acc này</button>
          </div>
        </div>
      `).join('');
    }

    function filterAcc(){
      const q = document.getElementById('searchInput').value.toLowerCase();
      renderGrid(accList.filter(a=>a.name.toLowerCase().includes(q)||(a.desc&&a.desc.toLowerCase().includes(q))));
    }

    function showToast(msg){
      const t=document.getElementById('toast');
      t.textContent=msg;t.classList.add('show');
      setTimeout(()=>t.classList.remove('show'),2800);
    }

    // Đóng modal khi click ngoài
    document.getElementById('loginModal').addEventListener('click', function(e){
      if(e.target===this) closeLogin();
    });

    renderGrid(accList);
  </script>
</body>
</html>
