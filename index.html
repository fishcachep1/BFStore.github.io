<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ShopRobloxS - Shop Acc Blox Fruit</title>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{--red:#e63946;--dark-red:#c1121f;--yellow:#ffd60a;--bg:#f0f4ff;--nav:#1a1a2e;}
    body{font-family:'Nunito',sans-serif;background:var(--bg);min-height:100vh;}

    .float-item{position:fixed;pointer-events:none;z-index:0;animation:floatAnim 6s ease-in-out infinite;opacity:0.15;}
    .float-item:nth-child(1){top:10%;left:5%;font-size:2rem;}
    .float-item:nth-child(2){top:35%;right:6%;font-size:1.6rem;animation-delay:2s;}
    .float-item:nth-child(3){top:65%;left:4%;font-size:1.8rem;animation-delay:1s;}
    .float-item:nth-child(4){top:80%;right:8%;font-size:1.4rem;animation-delay:3s;}
    @keyframes floatAnim{0%,100%{transform:translateY(0) rotate(0deg);}50%{transform:translateY(-18px) rotate(10deg);}}

    nav{background:var(--nav);padding:0 2rem;display:flex;align-items:center;height:60px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,0.3);}
    .logo{font-family:'Bangers',cursive;font-size:1.9rem;color:var(--yellow);letter-spacing:2px;text-shadow:2px 2px 0 var(--red);text-decoration:none;}
    .logo span{color:var(--red);}

    main{max-width:960px;margin:0 auto;padding:2.5rem 1.5rem;position:relative;z-index:1;text-align:center;}
    .page-title{font-family:'Bangers',cursive;font-size:2.2rem;color:var(--nav);letter-spacing:2px;margin-bottom:1.5rem;}

    /* VIDEO SECTION */
    .video-section{
      margin-bottom:2.5rem;
      position:relative;
    }
    .video-wrapper{
      position:relative;
      width:100%;max-width:560px;
      margin:0 auto;
      border-radius:20px;
      overflow:hidden;
      box-shadow:0 8px 40px rgba(230,57,70,0.35);
      border:3px solid var(--yellow);
    }
    .video-wrapper video{
      width:100%;display:block;
      background:#000;
    }
    .video-label{
      margin-top:0.8rem;
      font-size:0.8rem;font-weight:700;
      color:#888;letter-spacing:1px;text-transform:uppercase;
    }
    .video-glow{
      position:absolute;inset:-4px;
      border-radius:24px;
      background:linear-gradient(135deg,var(--yellow),var(--red));
      z-index:-1;
      filter:blur(12px);
      opacity:0.5;
      animation:glowPulse 2.5s ease-in-out infinite;
    }
    @keyframes glowPulse{0%,100%{opacity:0.4;}50%{opacity:0.75;}}

    /* DIVIDER */
    .divider{
      display:flex;align-items:center;gap:1rem;
      margin:0 auto 2rem;max-width:400px;
    }
    .divider-line{flex:1;height:2px;background:linear-gradient(to right,transparent,var(--red),transparent);}
    .divider-text{font-family:'Bangers',cursive;font-size:1rem;color:var(--red);letter-spacing:2px;white-space:nowrap;}

    /* GAME CARD */
    .badge-hot{display:inline-block;background:var(--red);color:white;font-size:0.7rem;font-weight:800;padding:3px 12px;border-radius:20px;letter-spacing:1px;margin-bottom:1.2rem;}
    .game-card{display:inline-block;background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 6px 24px rgba(230,57,70,0.18);cursor:pointer;transition:transform 0.22s,box-shadow 0.22s;text-decoration:none;color:inherit;width:260px;}
    .game-card:hover{transform:translateY(-8px) scale(1.03);box-shadow:0 16px 40px rgba(230,57,70,0.3);}
    .game-thumb{width:100%;aspect-ratio:16/10;background:linear-gradient(135deg,#0a3d62 0%,#e63946 100%);display:flex;align-items:center;justify-content:center;font-family:'Bangers',cursive;font-size:2rem;color:var(--yellow);letter-spacing:2px;text-shadow:2px 2px 0 #000;}
    .game-name{padding:1rem;font-weight:800;font-size:1rem;color:#1a1a2e;}

    .zalo-btn{position:fixed;right:1.5rem;bottom:2rem;background:#0068ff;color:white;border-radius:50%;width:52px;height:52px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:0.75rem;box-shadow:0 4px 16px rgba(0,104,255,0.4);text-decoration:none;z-index:100;transition:transform 0.2s;}
    .zalo-btn:hover{transform:scale(1.1);}
  </style>
</head>
