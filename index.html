<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ShopRobloxS - Shop Acc Roblox</title>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --red:#e63946;
      --dark-red:#c1121f;
      --yellow:#ffd60a;
      --bg:#f0f4ff;
      --card:#fff;
      --nav:#1a1a2e;
    }
    body{font-family:'Nunito',sans-serif;background:var(--bg);min-height:100vh;}

    /* FLOATING ITEMS */
    .float-item{position:fixed;pointer-events:none;z-index:0;animation:floatAnim 6s ease-in-out infinite;opacity:0.18;}
    .float-item:nth-child(1){top:10%;left:5%;font-size:2rem;animation-delay:0s;}
    .float-item:nth-child(2){top:30%;right:8%;font-size:1.5rem;animation-delay:1.5s;}
    .float-item:nth-child(3){top:60%;left:3%;font-size:1.8rem;animation-delay:3s;}
    .float-item:nth-child(4){top:70%;right:5%;font-size:2rem;animation-delay:2s;}
    .float-item:nth-child(5){top:85%;left:15%;font-size:1.3rem;animation-delay:4s;}
    @keyframes floatAnim{0%,100%{transform:translateY(0) rotate(0deg);}50%{transform:translateY(-18px) rotate(10deg);}}

    /* NAVBAR */
    nav{
      background:var(--nav);
      padding:0 2rem;
      display:flex;align-items:center;justify-content:space-between;
      height:60px;
      position:sticky;top:0;z-index:100;
      box-shadow:0 2px 12px rgba(0,0,0,0.3);
    }
    .logo{
      font-family:'Bangers',cursive;
      font-size:1.9rem;
      color:var(--yellow);
      letter-spacing:2px;
      text-shadow:2px 2px 0 var(--red);
      text-decoration:none;
    }
    .logo span{color:var(--red);}
    .nav-home{
      background:none;border:none;
      color:white;font-size:1.4rem;cursor:pointer;
      padding:6px 10px;border-radius:8px;
      transition:background 0.2s;
    }
    .nav-home:hover{background:rgba(255,255,255,0.1);}
    .nav-btns{display:flex;gap:0.7rem;}
    .btn-naptien{
      background:var(--red);color:white;
      border:none;padding:8px 18px;border-radius:8px;
      font-family:'Nunito',sans-serif;font-weight:700;font-size:0.9rem;
      cursor:pointer;transition:background 0.2s,transform 0.1s;
    }
    .btn-naptien:hover{background:var(--dark-red);transform:translateY(-1px);}
    .btn-dangky{background:#e63946;}
    .btn-dangnhap{background:#c1121f;}

    /* MAIN */
    main{max-width:1200px;margin:0 auto;padding:2rem 1.5rem;position:relative;z-index:1;}

    /* SECTION TITLE */
    .section-title{
      display:flex;align-items:center;gap:0.7rem;
      font-size:1.4rem;font-weight:800;color:#1a1a2e;
      margin-bottom:1.5rem;
    }
    .section-title img,.section-title span.icon{font-size:1.6rem;}

    /* GAME GRID */
    .game-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
      gap:1.2rem;
    }

    .game-card{
      background:var(--card);
      border-radius:14px;
      overflow:hidden;
      box-shadow:0 3px 12px rgba(0,0,0,0.1);
      cursor:pointer;
      transition:transform 0.22s,box-shadow 0.22s;
      text-decoration:none;
      color:inherit;
      display:block;
    }
    .game-card:hover{transform:translateY(-6px) scale(1.02);box-shadow:0 10px 28px rgba(230,57,70,0.25);}

    .game-thumb{
      width:100%;aspect-ratio:16/10;
      object-fit:cover;
      display:block;
      background:linear-gradient(135deg,#1a1a2e,#e63946);
    }
    .game-thumb-placeholder{
      width:100%;aspect-ratio:16/10;
      background:linear-gradient(135deg,#1a1a2e 0%,#e63946 100%);
      display:flex;align-items:center;justify-content:center;
      font-family:'Bangers',cursive;font-size:1.3rem;color:var(--yellow);
      letter-spacing:1px;text-align:center;padding:0.5rem;
      text-shadow:1px 1px 0 #000;
    }
    .game-name{
      padding:0.7rem 0.8rem;
      font-weight:700;font-size:0.85rem;
      text-align:center;color:#1a1a2e;
      line-height:1.3;
    }

    /* BADGE HOT */
    .card-wrap{position:relative;}
    .badge-hot{
      position:absolute;top:8px;left:8px;
      background:var(--red);color:white;
      font-size:0.65rem;font-weight:800;
      padding:2px 8px;border-radius:20px;
      text-transform:uppercase;letter-spacing:1px;
      box-shadow:0 2px 6px rgba(0,0,0,0.3);
      z-index:2;
    }

    /* FOOTER */
    footer{
      text-align:center;padding:2rem;
      color:#888;font-size:0.8rem;margin-top:3rem;
    }
  </style>
</head>
<body>

  <!-- Floating decorations -->
  <div class="float-item">🎮</div>
  <div class="float-item">⚔️</div>
  <div class="float-item">🎯</div>
  <div class="float-item">💎</div>
  <div class="float-item">🔥</div>

  <!-- NAVBAR -->
  <nav>
    <a class="logo" href="index.html">Shop<span>Roblox</span>S</a>
    <button class="nav-home" onclick="location.href='index.html'">🏠</button>
    <div class="nav-btns">
      <button class="btn-naptien">Nạp tiền</button>
      <button class="btn-naptien btn-dangky">Đăng ký</button>
      <button class="btn-naptien btn-dangnhap">Đăng nhập</button>
    </div>
  </nav>

  <!-- MAIN -->
  <main>
    <div class="section-title">
      <span class="icon">🎮</span>
      <span>Acc Roblox</span>
    </div>

    <div class="game-grid">

      <!-- BLOX FRUITS - dẫn sang trang shop -->
      <div class="card-wrap">
        <span class="badge-hot">🔥 Hot</span>
        <a class="game-card" href="bloxfruit.html">
          <div class="game-thumb-placeholder">BLOX<br>FRUIT</div>
          <div class="game-name">Shop acc Blox Fruits</div>
        </a>
      </div>

      <!-- Các game khác (placeholder, bạn có thể xóa hoặc thêm sau) -->
      <div class="card-wrap">
        <a class="game-card" href="#">
          <div class="game-thumb-placeholder" style="background:linear-gradient(135deg,#023e8a,#48cae4);">ESCAPE<br>TSUNAMI</div>
          <div class="game-name">Shop acc Escape Tsunami For Brainrots</div>
        </a>
      </div>

      <div class="card-wrap">
        <a class="game-card" href="#">
          <div class="game-thumb-placeholder" style="background:linear-gradient(135deg,#212529,#6c757d);">99 NIGHTS</div>
          <div class="game-name">Shop acc 99 Nights</div>
        </a>
      </div>

      <div class="card-wrap">
        <a class="game-card" href="#">
          <div class="game-thumb-placeholder" style="background:linear-gradient(135deg,#370617,#e85d04);">THE FORGE</div>
          <div class="game-name">Shop acc The Forge</div>
        </a>
      </div>

      <div class="card-wrap">
        <a class="game-card" href="#">
          <div class="game-thumb-placeholder" style="background:linear-gradient(135deg,#1b4332,#52b788);">GROW A<br>GARDEN</div>
          <div class="game-name">Shop acc Grow a Garden (GAG)</div>
        </a>
      </div>

      <div class="card-wrap">
        <a class="game-card" href="#">
          <div class="game-thumb-placeholder" style="background:linear-gradient(135deg,#03045e,#0096c7);">FISH IT</div>
          <div class="game-name">Fish It</div>
        </a>
      </div>

    </div>
  </main>

  <footer>© 2025 ShopRobloxS — Shop acc Roblox uy tín</footer>
</body>
</html>
